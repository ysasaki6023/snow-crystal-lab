<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#02050d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>❄ 雪結晶ラボ — Snow Crystal Lab</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>❄️</text></svg>">
<style>
  :root {
    --glass: rgba(10, 22, 45, 0.72);
    --glass-border: rgba(140, 190, 255, 0.18);
    --text: #dcebff;
    --text-dim: #8fb0d8;
    --accent: #7cc4ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #02050d; }
  body { font-family: "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif; color: var(--text); }
  #view { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

  .panel {
    position: fixed;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
  }

  #title {
    top: 18px; left: 20px; padding: 12px 18px;
  }
  #title h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.04em; }
  #title p { font-size: 11px; color: var(--text-dim); margin-top: 3px; }

  #controls {
    top: 18px; right: 18px; width: 318px; padding: 16px;
    max-height: calc(100vh - 36px);
    overflow-y: auto;
  }
  #controls::-webkit-scrollbar { width: 6px; }
  #controls::-webkit-scrollbar-thumb { background: rgba(140,190,255,0.25); border-radius: 3px; }

  .row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 13px; }
  .row label { font-size: 12.5px; color: var(--text); }
  .row .val { font-size: 12.5px; color: var(--accent); font-variant-numeric: tabular-nums; }
  input[type="range"] {
    width: 100%; margin-top: 5px; appearance: none; height: 4px; border-radius: 2px;
    background: linear-gradient(90deg, rgba(124,196,255,0.55), rgba(124,196,255,0.18));
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    appearance: none; width: 15px; height: 15px; border-radius: 50%;
    background: #e8f5ff; border: 2px solid #5fb0f0;
    box-shadow: 0 0 8px rgba(124,196,255,0.8); cursor: pointer;
  }

  .section { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(140,190,255,0.12); }
  .section h2 { font-size: 11px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.1em; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
  .chips button {
    font-size: 11.5px; padding: 5px 10px; border-radius: 999px; cursor: pointer;
    color: var(--text); background: rgba(124,196,255,0.10);
    border: 1px solid rgba(124,196,255,0.30);
    transition: background 0.15s;
  }
  .chips button:hover { background: rgba(124,196,255,0.28); }

  .btns { display: flex; gap: 8px; margin-top: 10px; }
  .btns button {
    flex: 1; font-size: 12.5px; padding: 8px 0; border-radius: 9px; cursor: pointer;
    color: var(--text); background: rgba(124,196,255,0.14);
    border: 1px solid rgba(124,196,255,0.35);
  }
  .btns button:hover { background: rgba(124,196,255,0.30); }

  .toggles { display: flex; gap: 16px; margin-top: 10px; font-size: 12px; color: var(--text-dim); }
  .toggles label { display: flex; align-items: center; gap: 5px; cursor: pointer; }

  #nakaya-wrap { margin-top: 10px; }
  #nakaya { width: 100%; border-radius: 8px; background: rgba(0,0,0,0.25); }
  #morph-wrap { margin-top: 8px; font-size: 12px; color: var(--text-dim); text-align: center; }
  #morph { font-size: 15px; color: #fff; font-weight: 600; margin-left: 6px; }

  #stats {
    bottom: 18px; left: 20px; padding: 12px 16px; font-size: 12px;
    display: grid; grid-template-columns: auto auto; gap: 3px 14px;
    font-variant-numeric: tabular-nums;
  }
  #stats .k { color: var(--text-dim); }
  #stats .v { color: var(--text); text-align: right; }

  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background: radial-gradient(ellipse at 50% 45%, transparent 52%, rgba(1, 3, 10, 0.55) 100%);
  }

  #toast {
    top: 24px; left: 50%; transform: translateX(-50%) translateY(-90px);
    padding: 11px 20px; font-size: 13px; color: #fff;
    background: rgba(20, 45, 90, 0.92);
    border: 1px solid rgba(140,190,255,0.4);
    border-radius: 10px; transition: transform 0.35s ease;
    position: fixed; z-index: 10;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  .panel { z-index: 6; }
  #panel-head { display: none; }

  /* ---------- モバイル: ボトムシート ---------- */
  @media (max-width: 760px), (pointer: coarse) and (max-width: 1024px) {
    #title { top: 10px; left: 10px; padding: 8px 12px; }
    #title h1 { font-size: 14px; }
    #title p { display: none; }

    #panel-head {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13.5px; font-weight: 600; padding: 2px 2px 10px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    #controls.mobile {
      top: auto; right: 0; left: 0; bottom: 0; width: 100%;
      border-radius: 18px 18px 0 0;
      max-height: 62dvh;
      padding: 12px 16px calc(14px + env(safe-area-inset-bottom));
      transition: transform 0.3s ease;
    }
    #controls.mobile.collapsed {
      transform: translateY(calc(100% - 44px));
      overflow: hidden;
    }
    .row { margin-top: 10px; }
    input[type="range"]::-webkit-slider-thumb { width: 22px; height: 22px; }

    #stats {
      bottom: auto; top: 56px; left: 10px;
      font-size: 10.5px; padding: 8px 11px; gap: 2px 10px;
    }
    #toast { width: calc(100vw - 40px); font-size: 12px; text-align: center; }
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three.module.js",
    "three/addons/": "./vendor/addons/"
  }
}
</script>
</head>
<body>
<canvas id="view"></canvas>

<div id="title" class="panel">
  <h1>❄ 雪結晶ラボ <span style="font-weight:300;color:var(--text-dim)">Snow Crystal Lab</span></h1>
  <p>気温・湿度・気圧・水分量で変わる結晶成長の 3D シミュレーション</p>
</div>

<div id="controls" class="panel">
  <div id="panel-head">⚙ パラメータ設定 <span id="panel-chevron">▾</span></div>
  <div class="row"><label>気温</label><span class="val" id="v-T"></span></div>
  <input type="range" id="s-T" min="-32" max="-0.5" step="0.1">

  <div class="row"><label>湿度 (氷面飽和に対して)</label><span class="val" id="v-RH"></span></div>
  <input type="range" id="s-RH" min="100" max="180" step="0.5">

  <div class="row"><label>水分量 (雲水量)</label><span class="val" id="v-W"></span></div>
  <input type="range" id="s-W" min="0.02" max="0.50" step="0.01">

  <div class="row"><label>気圧</label><span class="val" id="v-P"></span></div>
  <input type="range" id="s-P" min="300" max="1100" step="5">

  <div class="row"><label>成長速度</label><span class="val" id="v-speed"></span></div>
  <input type="range" id="s-speed" min="1" max="10" step="1">

  <div class="section">
    <h2>プリセット (中谷ダイヤグラム)</h2>
    <div class="chips">
      <button data-preset="dendrite">⭐ 星型樹枝</button>
      <button data-preset="sector">🌸 扇形板</button>
      <button data-preset="plate">⬡ 六角板</button>
      <button data-preset="needle">🪡 針</button>
      <button data-preset="column">🏛 角柱</button>
      <button data-preset="coldcol">🧊 低温柱</button>
    </div>
    <div class="btns">
      <button id="btn-run">⏸ 一時停止</button>
      <button id="btn-reset">↺ 最初から</button>
    </div>
    <div class="toggles">
      <label><input type="checkbox" id="tg-rotate" checked> 自動回転</label>
      <label><input type="checkbox" id="tg-hq"> 白い氷 (透過レンダリング)</label>
    </div>
  </div>

  <div class="section">
    <h2>形態ダイヤグラム</h2>
    <div id="nakaya-wrap"><canvas id="nakaya" width="286" height="180"></canvas></div>
    <div id="morph-wrap">予想される形態:<span id="morph"></span></div>
  </div>
</div>

<div id="stats" class="panel">
  <span class="k">ステップ</span><span class="v" id="step">0</span>
  <span class="k">セル数</span><span class="v" id="cells">0</span>
  <span class="k">直径 × 厚さ</span><span class="v" id="size">—</span>
  <span class="k">計算速度</span><span class="v"><span id="sps">0</span> step/s</span>
  <span class="k">三角形</span><span class="v" id="tris">—</span>
</div>

<div id="vignette"></div>
<div id="toast"></div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
